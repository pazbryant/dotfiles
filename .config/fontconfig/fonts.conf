<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <alias>
  <family>serif</family>
  <prefer>
   <family>National Park Medium</family>
   <family>Overpass</family>
   <family>Mamelon 4 Hi</family>
   <family>1HoonDdukbokki</family>
  </prefer>
 </alias>

 <alias>
  <family>sans-serif</family>
  <prefer>
   <family>National Park Medium</family>
   <family>Overpass</family>
   <family>Mamelon 4 Hi</family>
   <family>1HoonDdukbokki</family>
  </prefer>
 </alias>

 <alias>
  <family>ui-sans-serif</family>
  <prefer>
   <family>National Park Medium</family>
   <family>Overpass</family>
   <family>Mamelon 4 Hi</family>
   <family>1HoonDdukbokki</family>
  </prefer>
 </alias>

 <alias>
  <family>sans</family>
  <prefer>
   <family>National Park Medium</family>
   <family>Overpass</family>
   <family>Mamelon 4 Hi</family>
   <family>1HoonDdukbokki</family>
  </prefer>
 </alias>

 <alias>
  <family>-apple-system</family>
  <prefer>
   <family>National Park Medium</family>
   <family>Overpass</family>
  </prefer>
 </alias>

 <alias>
  <family>monospace</family>
  <prefer>
   <family>Maple Mono</family>
   <family>Maple Mono NL CN</family>
  </prefer>
 </alias>

 <alias>
  <family>ui-monospace</family>
  <prefer>
   <family>Maple Mono</family>
   <family>Maple Mono NL CN</family>
  </prefer>
 </alias>

</fontconfig>
