add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

# Directory configuration
[directory]
truncation_length = 3
truncate_to_repo = true
style = "blue"

# Git configuration
[git_branch]
format = "[$branch]($style) "
style = "bright-purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "red"

# Command duration
[cmd_duration]
min_time = 5000
format = "[$duration]($style) "

# Prompt character
[character]
success_symbol = "[➜](green)"
error_symbol = "[✗](red)"

# Disable unused modules for better performance
[aws]
disabled = true

[nodejs]
disabled = true

[package]
disabled = true
